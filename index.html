<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>WCK Activations Map</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.31/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap');

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Source Sans 3', sans-serif;
    }

    #viewDiv { height: 100%; width: 100%; }

    #custom-popup {
      position: fixed;
      background: #ffffff;
      border: 2px solid #c0185e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(192,24,94,0.1);
      width: 290px;
      z-index: 9999;
      display: none;
      overflow: hidden;
      pointer-events: all;
    }

    #popup-image {
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #f0f0f0;
    }

    #popup-content { padding: 14px 16px 16px; }

    #popup-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0 0 5px 0;
      line-height: 1.25;
    }

    #popup-time {
      color: #555;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 14px 0;
    }

    #popup-link {
      display: inline-block;
      padding: 9px 22px;
      border: 2px solid #c0185e;
      color: #c0185e;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }

    #popup-link:hover { background: #c0185e; color: #fff; }

    #popup-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    #popup-close:hover { background: #fff; color: #c0185e; }

    /* Debug panel — shows actual field names so we can confirm they match */
    #debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.78);
      color: #fff;
      font-size: 11px;
      font-family: monospace;
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 9999;
      max-width: 340px;
      word-break: break-all;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>

  <div id="custom-popup">
    <button id="popup-close" title="Close">✕</button>
    <div id="popup-image"></div>
    <div id="popup-content">
      <p id="popup-title"></p>
      <p id="popup-time"></p>
      <a id="popup-link" href="#" target="_blank" rel="noopener">Learn More →</a>
    </div>
  </div>

  <!-- Debug panel: hover over a point and this shows the real field names -->
  <div id="debug"></div>

  <script>
    require([
      "esri/config",
      "esri/WebMap",
      "esri/views/MapView"
    ], function(esriConfig, WebMap, MapView) {

      // Uncomment if basemap doesn't load — get free key at developers.arcgis.com
      // esriConfig.apiKey = "YOUR_API_KEY_HERE";

      const webmap = new WebMap({
        portalItem: {
          id: "62d36e2c9bc840619dd9cc10f56d5919",
          portal: { url: "https://wckorg.maps.arcgis.com" }
        }
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap,
        popup: { autoOpenEnabled: false },
        ui: { components: [] }
      });

      const popup    = document.getElementById("custom-popup");
      const imgEl    = document.getElementById("popup-image");
      const titleEl  = document.getElementById("popup-title");
      const timeEl   = document.getElementById("popup-time");
      const linkEl   = document.getElementById("popup-link");
      const closeBtn = document.getElementById("popup-close");
      const debugEl  = document.getElementById("debug");

      let hideTimeout = null;
      let isOverPopup = false;
      let popupPinned = false;

      closeBtn.addEventListener("click", () => {
        popupPinned = false;
        popup.style.display = "none";
      });

      popup.addEventListener("mouseenter", () => {
        isOverPopup = true;
        clearTimeout(hideTimeout);
      });

      popup.addEventListener("mouseleave", () => {
        isOverPopup = false;
        if (!popupPinned) scheduleHide();
      });

      function scheduleHide() {
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
          if (!isOverPopup && !popupPinned) popup.style.display = "none";
        }, 300);
      }

      function getAttr(attrs, ...names) {
        for (const n of names) {
          if (attrs[n] !== undefined && attrs[n] !== null && attrs[n] !== "") return attrs[n];
        }
        return "";
      }

      function positionPopup(x, y) {
        const W = 290, H = 360;
        const vw = window.innerWidth, vh = window.innerHeight;
        let left = x + 18, top = y - 140;
        if (left + W > vw - 10) left = x - W - 18;
        if (top + H > vh - 10)  top  = vh - H - 10;
        if (top < 10)           top  = 10;
        if (left < 10)          left = 10;
        popup.style.left = left + "px";
        popup.style.top  = top  + "px";
      }

      function showPopup(attrs, x, y) {
        // Show actual field names in debug panel — screenshot and send to me if popup is blank
        debugEl.style.display = "block";
        debugEl.textContent = "Fields detected: " + Object.keys(attrs).join(", ");

        const imageUrl    = getAttr(attrs, "Image URL", "Image_URL", "image_url", "Photo_URL");
        const timePeriod  = getAttr(attrs, "Time_Period", "Time Period", "time_period");
        const description = getAttr(attrs, "Description", "description", "URL", "url", "Link");
        const locName     = getAttr(attrs, "Location_Name", "Location Name", "location_name", "Name", "name");

        // If none of the fields matched, skip showing the popup
        if (!locName && !timePeriod && !description && !imageUrl) return;

        imgEl.style.display = imageUrl ? "block" : "none";
        if (imageUrl) imgEl.style.backgroundImage = `url('${imageUrl}')`;

        titleEl.textContent  = locName;
        timeEl.textContent   = timePeriod ? "🗓 " + timePeriod : "";
        linkEl.href          = description || "#";
        linkEl.style.display = description ? "inline-block" : "none";

        positionPopup(x, y);
        popup.style.display = "block";
      }

      // Only match point features — skip polygons, lines, and basemap
      function filterResults(hit) {
        return hit.results.filter(r => {
          if (!r.graphic || !r.layer) return false;
          if (r.layer.type !== "feature") return false;
          const geom = r.graphic.geometry;
          if (geom && geom.type !== "point") return false;
          return true;
        });
      }

      view.on("pointer-move", async (event) => {
        if (popupPinned) return;
        const hit = await view.hitTest(event, { includeBasemap: false });
        const results = filterResults(hit);

        if (results.length > 0) {
          clearTimeout(hideTimeout);
          showPopup(results[0].graphic.attributes, event.x, event.y);
          view.container.style.cursor = "pointer";
        } else {
          view.container.style.cursor = "default";
          if (!isOverPopup) scheduleHide();
        }
      });

      view.on("click", async (event) => {
        const hit = await view.hitTest(event, { includeBasemap: false });
        const results = filterResults(hit);

        if (results.length > 0) {
          popupPinned = true;
          showPopup(results[0].graphic.attributes, event.x, event.y);
        } else {
          popupPinned = false;
          popup.style.display = "none";
        }
      });

    });
  </script>
</body>
</html>
