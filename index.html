<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>WCK Activations Map</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.31/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap');

    * { box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%; margin: 0; padding: 0;
      font-family: 'Source Sans 3', sans-serif;
      overflow: hidden;
    }

    #viewDiv {
      height: 100%; width: 100%;
      position: absolute; top: 0; left: 0;
    }

    #custom-popup {
      position: absolute;
      background: #ffffff;
      border: 2px solid #c0185e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      width: 290px;
      z-index: 9999;
      display: none;
      overflow: hidden;
      pointer-events: auto;
    }

    #popup-image {
      width: 100%; height: 200px;
      background-size: cover;
      background-position: center;
      background-color: #f0f0f0;
    }

    #popup-content { padding: 14px 16px 16px; }

    #popup-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700;
      color: #1a1a1a;
      margin: 0 0 5px 0;
    }

    #popup-time {
      color: #555;
      font-size: 14px; font-weight: 600;
      margin: 0 0 14px 0;
    }

    #popup-link {
      display: inline-block;
      padding: 9px 22px;
      border: 2px solid #c0185e;
      color: #c0185e;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700; font-size: 13px;
    }

    #popup-link:hover { background: #c0185e; color: #fff; }

    #popup-close {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.9);
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 14px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>

  <div id="custom-popup">
    <button id="popup-close">✕</button>
    <div id="popup-image"></div>
    <div id="popup-content">
      <p id="popup-title"></p>
      <p id="popup-time"></p>
      <a id="popup-link" href="#" target="_blank" rel="noopener">Learn More →</a>
    </div>
  </div>

  <script>
    require([
      "esri/config",
      "esri/WebMap",
      "esri/views/MapView"
    ], function(esriConfig, WebMap, MapView) {

      const webmap = new WebMap({
        portalItem: {
          id: "62d36e2c9bc840619dd9cc10f56d5919",
          portal: { url: "https://wckorg.maps.arcgis.com" }
        }
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap,
        popup: { autoOpenEnabled: false },
        ui: { components: [] },
        // Wider starting extent — covers most of the world at a higher zoom
        center: [0, 20],
        zoom: 2,
        constraints: {
          minZoom: 2,
          rotationEnabled: false
        }
      });

      const popup    = document.getElementById("custom-popup");
      const imgEl    = document.getElementById("popup-image");
      const titleEl  = document.getElementById("popup-title");
      const timeEl   = document.getElementById("popup-time");
      const linkEl   = document.getElementById("popup-link");
      const closeBtn = document.getElementById("popup-close");

      let isOverPopup = false;
      let popupPinned = false;
      let lastOid = null;
      let attrCache = {}; // cache queried features so we don't re-query

      closeBtn.addEventListener("click", () => {
        popupPinned = false;
        popup.style.display = "none";
        lastOid = null;
      });

      popup.addEventListener("mouseenter", () => isOverPopup = true);
      popup.addEventListener("mouseleave", () => {
        isOverPopup = false;
        if (!popupPinned) popup.style.display = "none";
      });

      // ── Reset state when user returns to the tab ──
      // Without this, hover stays "stuck" if user switched apps and came back
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          // Page became visible again — reset hover state so it works freshly
          isOverPopup = false;
          if (!popupPinned) {
            popup.style.display = "none";
            lastOid = null;
          }
        }
      });

      window.addEventListener("focus", () => {
        isOverPopup = false;
        if (!popupPinned) {
          popup.style.display = "none";
          lastOid = null;
        }
      });

      // Also reset state when mouse re-enters the map area
      view.container.addEventListener("mouseenter", () => {
        if (!popupPinned) {
          lastOid = null;
        }
      });

      // ── Query the full feature attributes using its ObjectId ──
      async function getFullAttributes(layer, oid) {
        const cacheKey = layer.id + ":" + oid;
        if (attrCache[cacheKey]) return attrCache[cacheKey];

        const result = await layer.queryFeatures({
          objectIds: [oid],
          outFields: ["*"],
          returnGeometry: false
        });
        if (result.features.length > 0) {
          attrCache[cacheKey] = result.features[0].attributes;
          return attrCache[cacheKey];
        }
        return null;
      }

      // ── Show popup with full attributes ──
      function showPopup(attrs, x, y) {
        const imageUrl = attrs["Image URL"] || attrs["Image_URL"] || attrs["image_url"] || "";
        const timePeriod = attrs["Time_Period"] || attrs["Time Period"] || "";
        const description = attrs["Description"] || attrs["URL"] || "";
        const locName = attrs["Location_Name"] || attrs["Location Name"] || attrs["Name"] || "Activation";

        if (imageUrl) {
          imgEl.style.backgroundImage = `url('${imageUrl}')`;
          imgEl.style.display = "block";
        } else {
          imgEl.style.display = "none";
        }

        titleEl.textContent = locName;
        timeEl.textContent = timePeriod ? "🗓 " + timePeriod : "";
        linkEl.href = description || "#";
        linkEl.style.display = description ? "inline-block" : "none";

        // Position near cursor, keeping inside viewport
        const W = 290, H = 360;
        const vw = window.innerWidth, vh = window.innerHeight;
        let left = x + 18, top = y - 100;
        if (left + W > vw - 10) left = x - W - 18;
        if (top + H > vh - 10)  top  = vh - H - 10;
        if (top < 10)           top  = 10;
        if (left < 10)          left = 10;
        popup.style.left = left + "px";
        popup.style.top  = top  + "px";
        popup.style.display = "block";
      }

      // ── Layers/geometries to ignore ──
      // Skips any layer whose name contains one of these strings
      const IGNORED_LAYER_KEYWORDS = ["Land Area", "World Countries", "Countries"];

      function isValidFeatureResult(r) {
        if (!r.graphic || !r.layer || r.layer.type !== "feature") return false;

        // Log every hit so we can see what's actually being detected
        console.log("Layer hit:", JSON.stringify(r.layer.title), "geom:", r.graphic.geometry && r.graphic.geometry.type);

        // Skip by layer title keyword match
        const title = r.layer.title || "";
        for (const kw of IGNORED_LAYER_KEYWORDS) {
          if (title.toLowerCase().includes(kw.toLowerCase())) return false;
        }

        // Also skip non-point geometries (countries are polygons)
        const geom = r.graphic.geometry;
        if (geom && geom.type !== "point") return false;

        return true;
      }

      // ── Hover handler ──
      view.on("pointer-move", async (event) => {
        if (popupPinned) return;

        try {
          const hit = await view.hitTest(event);
          const featResult = hit.results.find(isValidFeatureResult);

          if (featResult) {
            const layer = featResult.layer;
            const oidField = layer.objectIdField || "OBJECTID";
            const oid = featResult.graphic.attributes[oidField] ||
                        featResult.graphic.attributes["ObjectId"] ||
                        featResult.graphic.attributes["objectid"];

            if (oid === lastOid && popup.style.display === "block") return;
            lastOid = oid;

            const fullAttrs = await getFullAttributes(layer, oid);
            if (fullAttrs) {
              showPopup(fullAttrs, event.x, event.y);
              view.container.style.cursor = "pointer";
            }
          } else {
            view.container.style.cursor = "default";
            if (!isOverPopup) {
              popup.style.display = "none";
              lastOid = null;
            }
          }
        } catch (e) {
          console.error("Hover error:", e);
        }
      });

      // ── Click pins popup ──
      view.on("click", async (event) => {
        const hit = await view.hitTest(event);
        const featResult = hit.results.find(isValidFeatureResult);
        if (featResult) {
          popupPinned = true;
          const layer = featResult.layer;
          const oidField = layer.objectIdField || "OBJECTID";
          const oid = featResult.graphic.attributes[oidField] ||
                      featResult.graphic.attributes["ObjectId"];
          const fullAttrs = await getFullAttributes(layer, oid);
          if (fullAttrs) showPopup(fullAttrs, event.x, event.y);
        } else {
          popupPinned = false;
          popup.style.display = "none";
        }
      });

    });
  </script>
</body>
</html>
